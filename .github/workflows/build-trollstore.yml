name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
          
      - name: Install xcodegen
        run: brew install xcodegen
          
      - name: Generate Xcode Project
        run: xcodegen
          
      - name: Build TVBox with Error Handling
        run: |
          # 清理构建目录
          echo "=== 清理构建目录 ==="
          xcodebuild clean -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS' || echo "清理完成"
          
          echo "=== 开始构建应用 ==="
          
          # 构建并捕获退出状态
          set +o pipefail
          xcodebuild build \
            -project tvbox.xcodeproj \
            -scheme tvbox \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✅ 构建成功"
            
            # 找到.app包
            APP_PATH=$(find ./DerivedData -name "tvbox.app" -type d | head -n 1)
            if [ -z "$APP_PATH" ]; then
              APP_PATH=$(find ./DerivedData -name "TVBox.app" -type d | head -n 1)
            fi
            
            if [ -z "$APP_PATH" ]; then
              echo "❌ 未找到.app文件"
              find ./DerivedData -name "*.app" -type d
              exit 1
            fi
            
            echo "APP_PATH: $APP_PATH"
            
            # 验证.app包结构
            echo "=== 验证.app包结构 ==="
            
            # 1. 检查可执行文件
            if [ -f "$APP_PATH/TVBox" ] || [ -f "$APP_PATH/tvbox" ]; then
              echo "✅ 可执行文件存在"
            else
              echo "⚠️ 可执行文件不存在，检查其他文件:"
              find "$APP_PATH" -type f -name "*" | grep -v ".DS_Store"
            fi
            
            # 2. 检查Info.plist
            if [ -f "$APP_PATH/Info.plist" ]; then
              echo "✅ Info.plist存在"
            else
              echo "⚠️ Info.plist不存在，从源位置复制"
              if [ -f "tvbox/Info.plist" ]; then
                cp "tvbox/Info.plist" "$APP_PATH/"
                echo "✅ 已复制Info.plist"
              else
                echo "❌ 源Info.plist也不存在"
              fi
            fi
            
            # 3. 确保PkgInfo存在
            if [ ! -f "$APP_PATH/PkgInfo" ]; then
              echo "APPL????" > "$APP_PATH/PkgInfo"
              echo "✅ 已创建PkgInfo"
            fi
            
            # 4. 重命名可执行文件（如果需要）
            if [ -f "$APP_PATH/__preview.dylib" ] && [ ! -f "$APP_PATH/TVBox" ]; then
              mv "$APP_PATH/__preview.dylib" "$APP_PATH/TVBox"
              echo "✅ 重命名__preview.dylib为TVBox"
            fi
            
            # 5. 更新Info.plist中的可执行文件名
            if [ -f "$APP_PATH/Info.plist" ] && [ -f "$APP_PATH/TVBox" ]; then
              /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable TVBox" "$APP_PATH/Info.plist" 2>/dev/null || true
            fi
            
            # 打包IPA
            echo "=== 打包IPA ==="
            mkdir -p ./Build
            TEMP_DIR=$(mktemp -d)
            mkdir -p "$TEMP_DIR/Payload"
            
            cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
            
            cd "$TEMP_DIR"
            zip -r "$GITHUB_WORKSPACE/Build/tvbox-Swift-TrollStore.ipa" Payload
            
            cd "$GITHUB_WORKSPACE"
            rm -rf "$TEMP_DIR"
            
            echo "✅ IPA打包完成: ./Build/tvbox-Swift-TrollStore.ipa"
            ls -lh ./Build/tvbox-Swift-TrollStore.ipa
            
            # 检查IPA文件大小
            IPA_SIZE=$(du -h ./Build/tvbox-Swift-TrollStore.ipa | cut -f1)
            echo "IPA文件大小: $IPA_SIZE"
            
            # 简单的IPA大小验证
            if [[ "$IPA_SIZE" =~ ^[0-9]+[.]?[0-9]*[KMG]?$ ]] && [[ "$IPA_SIZE" != "0K" ]] && [[ "$IPA_SIZE" != "0M" ]]; then
              echo "✅ IPA文件大小正常"
            else
              echo "⚠️ IPA文件大小异常: $IPA_SIZE"
            fi
            
          else
            echo "❌ 构建失败，退出码: $BUILD_EXIT_CODE"
            echo "=== 构建错误摘要 ==="
            
            # 提取错误信息
            echo "1. 链接器错误:"
            grep -A5 -B5 "ld:.*not found" build.log | head -20 || echo "无链接器错误"
            
            echo "2. 编译错误:"
            grep -A5 -B5 "error:" build.log | head -20 || echo "无编译错误"
            
            echo "3. 最后50行构建日志:"
            tail -50 build.log
            
            echo "❌ 构建失败，停止执行"
            exit 1
          fi
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Swift-TrollStore
          path: ./Build/tvbox-Swift-TrollStore.ipa
          retention-days: 30
          
      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./build.log
          retention-days: 7
