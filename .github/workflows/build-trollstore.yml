name: Build TrollStore TVBox

on:
  push:
    branches: [ main ] # 推送 main 分支时触发
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14 # 需使用 macOS 14（支持 Xcode 15+）
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true # 启用 Git LFS 支持，确保大文件正确拉取
          
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2' # 使用 Xcode 16.2
          
      - name: Install xcodegen
        run: brew install xcodegen
          
      - name: Generate Xcode Project
        run: xcodegen
          
      - name: Verify NodeMobile Framework
        run: |
          echo "=== 检查 NodeMobile.xcframework 结构 ==="
          
          if [ -d "Libraries/nodejs-mobile/NodeMobile.xcframework" ]; then
            echo "✅ NodeMobile.xcframework 存在"
            
            # 列出框架内容
            echo "框架内容:"
            find Libraries/nodejs-mobile/NodeMobile.xcframework -name "*.framework" -type d
            
            # 检查 Info.plist
            if [ -f "Libraries/nodejs-mobile/NodeMobile.xcframework/Info.plist" ]; then
              echo "✅ Info.plist 存在"
              # 解析 Info.plist 查看支持的平台
              plutil -p Libraries/nodejs-mobile/NodeMobile.xcframework/Info.plist | grep -A5 "AvailableLibraries" || true
            else
              echo "❌ Info.plist 不存在"
            fi
            
            # 检查 iOS arm64 架构
            if [ -d "Libraries/nodejs-mobile/NodeMobile.xcframework/ios-arm64" ]; then
              echo "✅ iOS arm64 架构存在"
              ls -la Libraries/nodejs-mobile/NodeMobile.xcframework/ios-arm64/
            else
              echo "⚠️ iOS arm64 架构不存在，检查其他架构:"
              ls -la Libraries/nodejs-mobile/NodeMobile.xcframework/
            fi
          else
            echo "❌ NodeMobile.xcframework 不存在"
            echo "当前目录结构:"
            find . -name "*.xcframework" -type d
            exit 1
          fi
          
      - name: Install Dependencies
        run: |
          # 安装巨魔打包依赖工具
          brew install libimobiledevice ideviceinstaller
          
      - name: Build TVBox (No Signing)
        run: |
          # 清理构建目录
          xcodebuild clean -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS'
          
          # 设置框架搜索路径
          NODE_FRAMEWORK_PATH="$(pwd)/Libraries/nodejs-mobile/NodeMobile.xcframework"
          echo "NodeMobile 框架路径: $NODE_FRAMEWORK_PATH"
          
          # 检查框架是否存在
          if [ ! -d "$NODE_FRAMEWORK_PATH" ]; then
            echo "❌ NodeMobile 框架不存在于: $NODE_FRAMEWORK_PATH"
            exit 1
          fi
          
          # 无签名构建，显式指定框架搜索路径
          xcodebuild build -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            FRAMEWORK_SEARCH_PATHS="\$(inherited) $NODE_FRAMEWORK_PATH" \
            OTHER_LDFLAGS="-framework NodeMobile"
          
          # 找到生成的 .app 包路径
          APP_PATH=$(find ./DerivedData -name "tvbox.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ./DerivedData -name "TVBox.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app 文件"
            find ./DerivedData -name "*.app" -type d
            exit 1
          fi
          
          echo "APP_PATH: $APP_PATH"
          
          # 打包为巨魔可安装的 IPA（无签名）
          mkdir -p ./Build
          cd $(dirname $APP_PATH)
          zip -r $GITHUB_WORKSPACE/Build/tvbox-Swift-TrollStore.ipa Payload
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Swift-TrollStore
          path: ./Build/tvbox-Swift-TrollStore.ipa
          retention-days: 30 # artifacts 保留 30 天
          
      - name: Upload Build Logs
        if: failure()  # 只在失败时上传日志
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ${{ runner.temp }}/xcodebuild_*.log
            ${{ runner.temp }}/xcodebuild_*.xcresult
          retention-days: 7
