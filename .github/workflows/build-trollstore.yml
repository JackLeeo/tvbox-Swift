name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Download Official Native NodeMobile Framework
        run: |
          echo "=== 下载官方原生 NodeMobile 框架 ==="
          VERSION="v18.20.4"
          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/${VERSION}/nodejs-mobile-${VERSION}-ios.zip"
          TARGET_DIR="Libraries/nodejs-mobile"

          mkdir -p $TARGET_DIR
          rm -rf $TARGET_DIR/NodeMobile.xcframework

          curl -fSL "$DOWNLOAD_URL" -o nodejs-mobile.zip

          # 解压到临时目录，避免污染工作区
          TEMP_DIR=$(mktemp -d)
          unzip -q nodejs-mobile.zip -d $TEMP_DIR

          # 查找 NodeMobile.xcframework 的实际位置
          FRAMEWORK_PATH=$(find $TEMP_DIR -name "NodeMobile.xcframework" -type d | head -1)
          if [ -z "$FRAMEWORK_PATH" ]; then
            echo "❌ 未找到 NodeMobile.xcframework"
            exit 1
          fi

          cp -r "$FRAMEWORK_PATH" $TARGET_DIR/
          rm -rf $TEMP_DIR nodejs-mobile.zip

          echo "✅ 框架已放置到 $TARGET_DIR/NodeMobile.xcframework"
      # ========== 验证框架文件完整性 ==========
      - name: Verify Framework Structure
        run: |
          echo "=== 验证框架文件完整性 ==="
          FRAMEWORK_PATH="Libraries/nodejs-mobile/NodeMobile.xcframework"
          REQUIRED_PATHS=(
            "$FRAMEWORK_PATH/Info.plist"
            "$FRAMEWORK_PATH/ios-arm64/NodeMobile.framework/NodeMobile"
            "$FRAMEWORK_PATH/ios-arm64/NodeMobile.framework/Info.plist"
          )

          MISSING_FILES=0
          for path in "${REQUIRED_PATHS[@]}"; do
            if [ ! -e "$path" ]; then
              echo "❌ 缺失必要文件: $path"
              MISSING_FILES=$((MISSING_FILES + 1))
            fi
          done

          if [ $MISSING_FILES -gt 0 ]; then
            echo "❌ 框架文件不完整，缺少 $MISSING_FILES 个必要组件"
            exit 1
          fi

          echo "✅ 框架文件结构完整"

      # ========== 验证关键 C 符号是否存在 ==========
      - name: Verify Required Symbols
        run: |
          echo "=== 验证关键 C 符号 ==="
          BINARY_PATH="Libraries/nodejs-mobile/NodeMobile.xcframework/ios-arm64/NodeMobile.framework/NodeMobile"

          REQUIRED_SYMBOLS=(
            "_node_start"
            "_node_post_message"
            "_node_register_message_callback"
          )

          ALL_SYMBOLS=$(mktemp)
          nm -gU "$BINARY_PATH" 2>/dev/null > "$ALL_SYMBOLS"

          MISSING_SYMBOLS=0
          for sym in "${REQUIRED_SYMBOLS[@]}"; do
            if grep -q "$sym" "$ALL_SYMBOLS"; then
              echo "✅ 符号存在: $sym"
            else
              echo "❌ 符号缺失: $sym"
              MISSING_SYMBOLS=$((MISSING_SYMBOLS + 1))
            fi
          done

          rm -f "$ALL_SYMBOLS"

          if [ $MISSING_SYMBOLS -gt 0 ]; then
            echo ""
            echo "❌ 错误：框架中缺失 $MISSING_SYMBOLS 个必要符号。"
            echo "   请确保使用的是官方原生 iOS 框架，而非 React Native 插件版。"
            exit 1
          fi

          echo "✅ 所有必要符号均存在"

      - name: Generate Xcode Project
        run: xcodegen

      - name: Build TVBox
        run: |
          echo "=== 清理构建目录 ==="
          xcodebuild clean -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS' || echo "清理完成"

          echo "=== 开始构建应用 ==="
          set +o pipefail
          xcodebuild build \
            -project tvbox.xcodeproj \
            -scheme tvbox \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            2>&1 | tee build.log

          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✅ 构建成功"
            APP_PATH=$(find ./DerivedData -name "tvbox.app" -type d | head -1)
            [ -z "$APP_PATH" ] && APP_PATH=$(find ./DerivedData -name "TVBox.app" -type d | head -1)

            if [ -z "$APP_PATH" ]; then
              echo "❌ 未找到 .app 文件"
              exit 1
            fi

            mkdir -p Build/Payload
            cp -r "$APP_PATH" Build/Payload/
            cd Build
            zip -r tvbox-Swift-TrollStore.ipa Payload
            cd ..
            echo "✅ IPA 打包完成: Build/tvbox-Swift-TrollStore.ipa"
          else
            echo "❌ 构建失败，退出码: $BUILD_EXIT_CODE"
            echo "=== 构建错误摘要 ==="
            grep -A5 -B5 "error:" build.log | head -30 || echo "无编译错误"
            tail -50 build.log
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Swift-TrollStore
          path: Build/tvbox-Swift-TrollStore.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          retention-days: 7
