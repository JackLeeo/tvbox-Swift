name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
          
      - name: Install xcodegen
        run: brew install xcodegen
          
      # ========== 关键：用npm install稳定下载正确框架 ==========
      - name: Download Correct NodeMobile Framework via npm
        run: |
          echo "=== 通过npm install下载RN插件版NodeMobile框架 ==="
          
          TARGET_DIR="Libraries/nodejs-mobile"
          mkdir -p $TARGET_DIR
          rm -rf $TARGET_DIR/NodeMobile.xcframework
          
          # 创建临时目录，用npm install安装（最稳定的方式）
          TMP_NPM_DIR=$(mktemp -d)
          cd "$TMP_NPM_DIR"
          
          echo "初始化临时npm项目..."
          npm init -y
          
          echo "安装nodejs-mobile-react-native@18.19.0..."
          npm install nodejs-mobile-react-native@18.19.0
          
          echo "复制框架到项目目录..."
          cp -r node_modules/nodejs-mobile-react-native/ios/NodeMobile.xcframework "$GITHUB_WORKSPACE/$TARGET_DIR/"
          
          # 清理
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TMP_NPM_DIR"
          
          echo "✅ 框架下载完成"
          
          # ========== 强制验证关键符号 ==========
          echo ""
          echo "=== 验证关键符号 ==="
          BINARY_PATH="$TARGET_DIR/NodeMobile.xcframework/ios-arm64/NodeMobile.framework/NodeMobile"
          
          if [ ! -f "$BINARY_PATH" ]; then
            echo "❌ 二进制文件不存在"
            exit 1
          fi
          
          # 检查 node_start
          echo "1. 检查 node_start:"
          nm "$BINARY_PATH" 2>/dev/null | grep "_node_start"
          if [ $? -ne 0 ]; then
            echo "❌ 未找到 node_start"
            exit 1
          fi
          
          # 检查 node_post_message
          echo ""
          echo "2. 检查 node_post_message:"
          nm "$BINARY_PATH" 2>/dev/null | grep "_node_post_message"
          if [ $? -ne 0 ]; then
            echo "❌ 未找到 node_post_message"
            exit 1
          fi
          
          # 检查 node_register_message_callback
          echo ""
          echo "3. 检查 node_register_message_callback:"
          nm "$BINARY_PATH" 2>/dev/null | grep "_node_register_message_callback"
          if [ $? -ne 0 ]; then
            echo "❌ 未找到 node_register_message_callback"
            exit 1
          fi
          
          echo ""
          echo "✅ 所有关键符号验证通过！"
      # ============================================================
          
      - name: Generate Xcode Project
        run: xcodegen
          
      - name: Build TVBox
        run: |
          echo "=== 开始构建 ==="
          set +o pipefail
          xcodebuild build \
            -project tvbox.xcodeproj \
            -scheme tvbox \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✅ 构建成功"
            
            APP_PATH=$(find ./DerivedData -name "*.app" -type d | head -1)
            mkdir -p Build/Payload
            cp -r "$APP_PATH" Build/Payload/
            cd Build
            zip -r tvbox.ipa Payload
            
            echo "✅ IPA打包完成"
          else
            echo "❌ 构建失败"
            tail -100 build.log
            exit 1
          fi
          
      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Swift
          path: Build/tvbox.ipa
          
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
