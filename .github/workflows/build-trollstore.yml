name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Download & Extract RN Plugin NodeMobile Framework
        run: |
          echo "=== 下载 RN 插件版 NodeMobile 框架 ==="
          NODEJS_VERSION="18.20.4"
          TARGET_DIR="Libraries/nodejs-mobile"
          mkdir -p $TARGET_DIR
          rm -rf $TARGET_DIR/NodeMobile.xcframework

          # 下载 npm 包
          curl -L "https://registry.npmjs.org/nodejs-mobile-react-native/-/nodejs-mobile-react-native-$NODEJS_VERSION.tgz" -o nodejs-mobile.tgz

          # 解压到临时目录并复制框架
          TEMP_DIR=$(mktemp -d)
          tar -xzf nodejs-mobile.tgz -C $TEMP_DIR
          cp -r $TEMP_DIR/package/ios/NodeMobile.xcframework $TARGET_DIR/

          rm -rf $TEMP_DIR nodejs-mobile.tgz
          echo "✅ 框架已放置到 $TARGET_DIR/NodeMobile.xcframework"
          ls -la $TARGET_DIR/NodeMobile.xcframework

      - name: Generate Xcode Project
        run: xcodegen

      - name: Build TVBox
        run: |
          echo "=== 清理构建目录 ==="
          xcodebuild clean -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS' || echo "清理完成"

          echo "=== 开始构建应用 ==="
          set +o pipefail
          xcodebuild build \
            -project tvbox.xcodeproj \
            -scheme tvbox \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            2>&1 | tee build.log

          BUILD_EXIT_CODE=${PIPESTATUS[0]}

          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✅ 构建成功"
            APP_PATH=$(find ./DerivedData -name "tvbox.app" -type d | head -1)
            [ -z "$APP_PATH" ] && APP_PATH=$(find ./DerivedData -name "TVBox.app" -type d | head -1)

            if [ -z "$APP_PATH" ]; then
              echo "❌ 未找到 .app 文件"
              exit 1
            fi

            # 打包 IPA
            mkdir -p Build/Payload
            cp -r "$APP_PATH" Build/Payload/
            cd Build
            zip -r tvbox-Swift-TrollStore.ipa Payload
            cd ..
            echo "✅ IPA 打包完成: Build/tvbox-Swift-TrollStore.ipa"
          else
            echo "❌ 构建失败"
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Swift-TrollStore
          path: Build/tvbox-Swift-TrollStore.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          retention-days: 7
