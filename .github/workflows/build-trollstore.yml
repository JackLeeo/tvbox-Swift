name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
          
      - name: Install xcodegen
        run: brew install xcodegen
          
      - name: Generate Xcode Project
        run: xcodegen
          
      - name: Build TVBox (No Signing)
        run: |
          # 清理构建目录
          xcodebuild clean -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS'
          
          # 设置框架搜索路径
          NODE_FRAMEWORK_PATH="$(pwd)/Libraries/nodejs-mobile/NodeMobile.xcframework"
          echo "NodeMobile 框架路径: $NODE_FRAMEWORK_PATH"
          
          # 无签名构建
          xcodebuild build -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            FRAMEWORK_SEARCH_PATHS="\$(inherited) $NODE_FRAMEWORK_PATH" \
            OTHER_LDFLAGS="-framework NodeMobile"
          
          # 找到生成的 .app 包路径
          APP_PATH=$(find ./DerivedData -name "tvbox.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ./DerivedData -name "TVBox.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app 文件"
            find ./DerivedData -name "*.app" -type d
            exit 1
          fi
          
          echo "APP_PATH: $APP_PATH"
          
          # 修正的 IPA 打包步骤
          mkdir -p ./Build
          
          # 创建临时目录结构
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          
          # 复制 .app 文件到 Payload 目录
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          
          # 进入临时目录并压缩
          cd "$TEMP_DIR"
          zip -r "$GITHUB_WORKSPACE/Build/tvbox-Swift-TrollStore.ipa" Payload
          
          # 清理临时目录
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"
          
          echo "✅ IPA 打包完成: ./Build/tvbox-Swift-TrollStore.ipa"
          ls -lh ./Build/tvbox-Swift-TrollStore.ipa
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Swift-TrollStore
          path: ./Build/tvbox-Swift-TrollStore.ipa
          retention-days: 30
