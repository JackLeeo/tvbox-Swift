name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
          
      - name: Install xcodegen
        run: brew install xcodegen
          
      - name: Generate Xcode Project
        run: xcodegen
          
      - name: Build and Fix App Bundle
        run: |
          # 清理构建目录
          xcodebuild clean -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS'
          
          echo "=== 构建应用 ==="
          xcodebuild build \
            -project tvbox.xcodeproj \
            -scheme tvbox \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            ENABLE_PREVIEWS=NO \
            ENABLE_SWIFTUI_PREVIEWS=NO \
            GENERATE_PKGINFO_FILE=YES \
            MACH_O_TYPE=mh_execute
          
          # 找到.app包
          APP_PATH=$(find ./DerivedData -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到.app文件"
            find ./DerivedData -name "*" -type d
            exit 1
          fi
          
          echo "APP_PATH: $APP_PATH"
          
          # 修复.app包结构
          echo "=== 修复.app包结构 ==="
          
          # 1. 确保Info.plist存在
          if [ ! -f "$APP_PATH/Info.plist" ] && [ -f "tvbox/Info.plist" ]; then
            echo "复制Info.plist到.app包"
            cp "tvbox/Info.plist" "$APP_PATH/"
          fi
          
          # 2. 创建PkgInfo
          if [ ! -f "$APP_PATH/PkgInfo" ]; then
            echo "APPL????" > "$APP_PATH/PkgInfo"
          fi
          
          # 3. 重命名可执行文件
          if [ -f "$APP_PATH/__preview.dylib" ] && [ ! -f "$APP_PATH/TVBox" ]; then
            mv "$APP_PATH/__preview.dylib" "$APP_PATH/TVBox"
            echo "重命名__preview.dylib为TVBox"
          fi
          
          # 4. 更新Info.plist中的可执行文件名
          if [ -f "$APP_PATH/Info.plist" ]; then
            # 使用PlistBuddy更新CFBundleExecutable
            /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable TVBox" "$APP_PATH/Info.plist" 2>/dev/null || true
          fi
          
          # 验证修复结果
          echo "=== 验证修复结果 ==="
          echo "1. Info.plist: $(ls -la "$APP_PATH/Info.plist" 2>/dev/null || echo '不存在')"
          echo "2. PkgInfo: $(ls -la "$APP_PATH/PkgInfo" 2>/dev/null || echo '不存在')"
          echo "3. 可执行文件TVBox: $(ls -la "$APP_PATH/TVBox" 2>/dev/null || echo '不存在')"
          echo "4. 完整文件列表:"
          find "$APP_PATH" -type f | head -20
          
          # 打包IPA
          echo "=== 打包IPA ==="
          mkdir -p ./Build
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          
          cd "$TEMP_DIR"
          zip -r "$GITHUB_WORKSPACE/Build/tvbox-Swift-TrollStore.ipa" Payload
          
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"
          
          echo "✅ IPA打包完成: ./Build/tvbox-Swift-TrollStore.ipa"
          ls -lh ./Build/tvbox-Swift-TrollStore.ipa
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Swift-TrollStore
          path: ./Build/tvbox-Swift-TrollStore.ipa
          retention-days: 30
