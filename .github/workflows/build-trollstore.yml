name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Download Official Native NodeMobile Framework
        run: |
          echo "=== 下载官方原生 NodeMobile 框架 ==="
          VERSION="v18.20.4"
          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/${VERSION}/nodejs-mobile-${VERSION}-ios.zip"
          TARGET_DIR="Libraries/nodejs-mobile"
          mkdir -p $TARGET_DIR
          rm -rf $TARGET_DIR/NodeMobile.xcframework

          curl -fSL "$DOWNLOAD_URL" -o nodejs-mobile.zip || {
            echo "❌ 框架下载失败"
            exit 1
          }

          TEMP_DIR=$(mktemp -d)
          unzip -q nodejs-mobile.zip -d $TEMP_DIR

          FRAMEWORK_PATH=$(find $TEMP_DIR -name "NodeMobile.xcframework" -type d | head -1)
          if [ -z "$FRAMEWORK_PATH" ]; then
            echo "❌ 未找到 NodeMobile.xcframework"
            exit 1
          fi

          cp -r "$FRAMEWORK_PATH" $TARGET_DIR/
          rm -rf $TEMP_DIR nodejs-mobile.zip

          echo "✅ 框架已放置到 $TARGET_DIR/NodeMobile.xcframework"

      - name: Verify Framework Structure
        run: |
          echo "=== 验证框架文件完整性 ==="
          FRAMEWORK_PATH="Libraries/nodejs-mobile/NodeMobile.xcframework"
          REQUIRED_PATHS=(
            "$FRAMEWORK_PATH/Info.plist"
            "$FRAMEWORK_PATH/ios-arm64/NodeMobile.framework/NodeMobile"
            "$FRAMEWORK_PATH/ios-arm64/NodeMobile.framework/Info.plist"
          )

          MISSING_FILES=0
          for path in "${REQUIRED_PATHS[@]}"; do
            if [ ! -e "$path" ]; then
              echo "❌ 缺失必要文件: $path"
              MISSING_FILES=$((MISSING_FILES + 1))
            fi
          done

          if [ $MISSING_FILES -gt 0 ]; then
            echo "❌ 框架文件不完整，缺少 $MISSING_FILES 个必要组件"
            exit 1
          fi

          echo "✅ 框架文件结构完整"

      - name: Verify Required Symbols
        run: |
          echo "=== 验证关键 C 符号 ==="
          BINARY_PATH="Libraries/nodejs-mobile/NodeMobile.xcframework/ios-arm64/NodeMobile.framework/NodeMobile"

          REQUIRED_SYMBOLS=("_node_start")

          ALL_SYMBOLS=$(mktemp)
          nm -gU "$BINARY_PATH" 2>/dev/null > "$ALL_SYMBOLS"

          MISSING_SYMBOLS=0
          for sym in "${REQUIRED_SYMBOLS[@]}"; do
            if grep -q "$sym" "$ALL_SYMBOLS"; then
              echo "✅ 符号存在: $sym"
            else
              echo "❌ 符号缺失: $sym"
              MISSING_SYMBOLS=$((MISSING_SYMBOLS + 1))
            fi
          done

          rm -f "$ALL_SYMBOLS"

          if [ $MISSING_SYMBOLS -gt 0 ]; then
            echo "❌ 错误：框架中缺失必要符号"
            exit 1
          fi

          echo "✅ 必要符号验证通过"

      - name: Generate Xcode Project
        run: xcodegen

      - name: Verify Node.js resources
        run: |
          echo "=== 验证 Node.js 脚本资源 ==="
          SCRIPT_PATH="tvbox/Resources/nodejs-project/type3-parser.js"
          PACKAGE_PATH="tvbox/Resources/nodejs-project/package.json"
          MISSING=0

          if [ ! -f "$SCRIPT_PATH" ]; then
            echo "❌ 缺少脚本文件: $SCRIPT_PATH"
            MISSING=1
          else
            echo "✅ 脚本文件存在: $SCRIPT_PATH"
            if grep -q "require('rn-bridge')" "$SCRIPT_PATH"; then
              echo "⚠️ 警告：脚本中引用了 rn-bridge，但原生框架不支持！"
              echo "   请确保使用纯 HTTP 服务器版本的 type3-parser.js"
            else
              echo "✅ 脚本未引用 rn-bridge，符合原生框架要求"
            fi
          fi

          if [ ! -f "$PACKAGE_PATH" ]; then
            echo "❌ 缺少 package.json: $PACKAGE_PATH"
            MISSING=1
          else
            echo "✅ package.json 存在"
          fi

          if [ $MISSING -eq 1 ]; then
            echo "❌ 缺少必要的 Node.js 资源文件，构建中止。"
            exit 1
          fi

          echo "✅ Node.js 资源文件验证通过"

       # 👇 我帮你加的这一步：自动安装Node.js依赖（Jar/DEX解析支持）
      - name: Install Node.js Dependencies
        run: |
          echo "=== 自动安装Jar/DEX解析所需的Node.js依赖 ==="
          cd tvbox/Resources/nodejs-project/
          npm install --production
          echo "✅ 依赖安装完成，已打包到资源目录"        

      - name: Check for SwiftData remnants
        run: |
          echo "=== 检查项目中是否残留 SwiftData 代码 ==="
          RESIDUE_FOUND=0

          echo "1. 检查 import SwiftData:"
          grep -rn --include="*.swift" "import SwiftData" tvbox/ && RESIDUE_FOUND=1 || echo "   ✅ 无残留"

          echo "2. 检查 @Query:"
          grep -rn --include="*.swift" "@Query" tvbox/ && RESIDUE_FOUND=1 || echo "   ✅ 无残留"

          echo "3. 检查 modelContext:"
          grep -rn --include="*.swift" "modelContext" tvbox/ && RESIDUE_FOUND=1 || echo "   ✅ 无残留"

          echo "4. 检查 ModelContainer:"
          grep -rn --include="*.swift" "ModelContainer" tvbox/ && RESIDUE_FOUND=1 || echo "   ✅ 无残留"

          echo "5. 检查 @Model:"
          grep -rn --include="*.swift" "@Model" tvbox/ && RESIDUE_FOUND=1 || echo "   ✅ 无残留"

          if [ $RESIDUE_FOUND -eq 1 ]; then
            echo "❌ 发现 SwiftData 代码残留！请移除所有 SwiftData 相关代码后再提交。"
            exit 1
          else
            echo "✅ 未发现 SwiftData 残留，可以继续构建。"
          fi

      - name: Pre-build Static Analysis
        run: |
          echo "=== 静态代码检查（iOS 16 兼容性 & 业务逻辑） ==="
          ISSUES_FOUND=0

          # 1. 检查 SwiftData 残留
          echo ">> 检查 SwiftData 残留..."
          if grep -rq "import SwiftData" tvbox/; then
            echo "❌ 发现 'import SwiftData' 残留："
            grep -rn "import SwiftData" tvbox/
            ISSUES_FOUND=1
          else
            echo "✅ 无 SwiftData import"
          fi

          if grep -rq "@Query" tvbox/; then
            echo "❌ 发现 '@Query' 残留："
            grep -rn "@Query" tvbox/
            ISSUES_FOUND=1
          else
            echo "✅ 无 @Query"
          fi

          if grep -rq "modelContext" tvbox/; then
            echo "❌ 发现 'modelContext' 残留："
            grep -rn "modelContext" tvbox/
            ISSUES_FOUND=1
          else
            echo "✅ 无 modelContext"
          fi

          # 2. 检查 iOS 17+ 特有 API
          echo ">> 检查 iOS 17+ API..."
          if grep -rq "\.onChange(of:.*initial:" tvbox/; then
            echo "❌ 发现 iOS 17 专属 API '.onChange(of:initial:_:)'："
            grep -rn "\.onChange(of:.*initial:" tvbox/
            ISSUES_FOUND=1
          else
            echo "✅ 无 iOS 17 专有 onChange"
          fi

          # 3. 检查 SourceBean 是否仍然排斥 type=3
          echo ">> 检查 SourceBean 对 type=3 的支持..."
          if grep -q 'type == 0 || type == 1 || type == 4' tvbox/Models/SourceBean.swift; then
            echo "❌ SourceBean.isSupportedInSwift 仍然排除了 type=3"
            grep -n "isSupportedInSwift" tvbox/Models/SourceBean.swift -A5
            ISSUES_FOUND=1
          else
            echo "✅ SourceBean 已包含 type=3 支持"
          fi

          # 4. 检查设置页/源选择页是否仍然过滤了 type=3
          echo ">> 检查视图层是否过滤了 type=3..."
          if grep -rq 'isSupportedInSwift' tvbox/Views/; then
            echo "⚠️ 视图层仍在使用 isSupportedInSwift 进行过滤，可能导致 type=3 源被隐藏"
            grep -rn 'isSupportedInSwift' tvbox/Views/
            # 仅警告，不强制失败
          fi

          if [ $ISSUES_FOUND -eq 1 ]; then
            echo ""
            echo "❌ 静态检查发现必须修复的问题，构建中止。"
            exit 1
          else
            echo "✅ 静态检查通过，继续构建。"
          fi

      - name: Build TVBox
        run: |
          echo "=== 清理构建目录 ==="
          xcodebuild clean -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS' || echo "清理完成"
          git config --global url."https://${{ secrets.GITHUB_TOKEN }}@github.com/".insteadOf "https://github.com/"       
          echo "=== 开始构建应用 ==="
          set +o pipefail
          xcodebuild build \
            -project tvbox.xcodeproj \
            -scheme tvbox \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          # 生成错误摘要文件
          echo "=== 生成错误摘要 ===" > error_summary.txt
          grep -n -B5 -A5 "error:" build.log >> error_summary.txt || echo "未找到错误信息" >> error_summary.txt
          
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✅ 构建成功"
            
            APP_PATH=$(find ./DerivedData -name "tvbox.app" -type d | head -1)
            if [ -z "$APP_PATH" ]; then
              APP_PATH=$(find ./DerivedData -name "TVBox.app" -type d | head -1)
            fi
            
            if [ -z "$APP_PATH" ]; then
              echo "❌ 未找到.app文件"
              find ./DerivedData -name "*.app" -type d
              exit 1
            fi
            
            echo "APP_PATH: $APP_PATH"
            
            # 验证.app包结构
            echo "=== 验证.app包结构 ==="
            if [ -f "$APP_PATH/TVBox" ] || [ -f "$APP_PATH/tvbox" ]; then
              echo "✅ 可执行文件存在"
            else
              echo "⚠️ 可执行文件不存在，检查其他文件:"
              find "$APP_PATH" -type f -name "*" | grep -v ".DS_Store"
              if [ -f "$APP_PATH/__preview.dylib" ]; then
                mv "$APP_PATH/__preview.dylib" "$APP_PATH/TVBox"
                echo "✅ 已重命名 __preview.dylib 为 TVBox"
              fi
            fi
            
            if [ ! -f "$APP_PATH/Info.plist" ]; then
              echo "⚠️ Info.plist不存在，创建自动修复"
              printf '%s\n' \
                '<?xml version="1.0" encoding="UTF-8"?>' \
                '<!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">' \
                '<plist version="1.0">' \
                '<dict>' \
                '    <key>CFBundleDevelopmentRegion</key><string>en</string>' \
                '    <key>CFBundleDisplayName</key><string>TVBox</string>' \
                '    <key>CFBundleExecutable</key><string>TVBox</string>' \
                '    <key>CFBundleIdentifier</key><string>com.tvbox.app</string>' \
                '    <key>CFBundleInfoDictionaryVersion</key><string>6.0</string>' \
                '    <key>CFBundleName</key><string>TVBox</string>' \
                '    <key>CFBundlePackageType</key><string>APPL</string>' \
                '    <key>CFBundleShortVersionString</key><string>1.0.3</string>' \
                '    <key>CFBundleVersion</key><string>1</string>' \
                '    <key>LSRequiresIPhoneOS</key><true/>' \
                '    <key>UIApplicationSupportsIndirectInputEvents</key><true/>' \
                '    <key>UILaunchScreen</key><dict/>' \
                '    <key>UIRequiredDeviceCapabilities</key><array><string>armv7</string></array>' \
                '    <key>UISupportedInterfaceOrientations</key><array><string>UIInterfaceOrientationPortrait</string><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>' \
                '    <key>UISupportedInterfaceOrientations~ipad</key><array><string>UIInterfaceOrientationPortrait</string><string>UIInterfaceOrientationPortraitUpsideDown</string><string>UIInterfaceOrientationLandscapeLeft</string><string>UIInterfaceOrientationLandscapeRight</string></array>' \
                '    <key>NSAppTransportSecurity</key><dict><key>NSAllowsArbitraryLoads</key><true/></dict>' \
                '</dict></plist>' \
                > "$APP_PATH/Info.plist"
              echo "✅ Info.plist 创建完成"
            fi
            
            if [ ! -f "$APP_PATH/PkgInfo" ]; then
              echo "APPL????" > "$APP_PATH/PkgInfo"
              echo "✅ 已创建PkgInfo"
            fi
            
            if [ -f "$APP_PATH/Info.plist" ] && [ -f "$APP_PATH/TVBox" ]; then
              /usr/libexec/PlistBuddy -c "Set :CFBundleExecutable TVBox" "$APP_PATH/Info.plist" 2>/dev/null || true
            fi
            
            echo ".app包内容:"
            ls -la "$APP_PATH/"
            
            # 打包IPA
            echo "=== 打包IPA ==="
            mkdir -p ./Build
            TEMP_DIR=$(mktemp -d)
            mkdir -p "$TEMP_DIR/Payload"
            cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
            cd "$TEMP_DIR"
            zip -r "$GITHUB_WORKSPACE/Build/tvbox-Swift-TrollStore.ipa" Payload
            cd "$GITHUB_WORKSPACE"
            rm -rf "$TEMP_DIR"
            
            echo "✅ IPA打包完成: ./Build/tvbox-Swift-TrollStore.ipa"
            ls -lh ./Build/tvbox-Swift-TrollStore.ipa
            
          else
            echo "❌ 构建失败，退出码: $BUILD_EXIT_CODE"
            echo "=== 错误摘要（最后50行） ==="
            tail -50 build.log
            echo ""
            echo "完整错误信息请下载 build-logs artifact"
            exit 1
          fi

      - name: Upload IPA Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Swift-TrollStore
          path: ./Build/tvbox-Swift-TrollStore.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./build.log
            ./error_summary.txt
          retention-days: 7
