name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Download Official Native NodeMobile Framework
        run: |
          echo "=== 下载官方原生 NodeMobile 框架 ==="
          VERSION="v18.19.0"
          DOWNLOAD_URL="https://github.com/nodejs-mobile/nodejs-mobile/releases/download/${VERSION}/nodejs-mobile-${VERSION}-ios.zip"
          TARGET_DIR="Libraries/nodejs-mobile"

          mkdir -p $TARGET_DIR
          rm -rf $TARGET_DIR/NodeMobile.xcframework

          curl -L "$DOWNLOAD_URL" -o nodejs-mobile.zip
          unzip -q nodejs-mobile.zip
          cp -r Release-universal/NodeMobile.xcframework $TARGET_DIR/
          rm -rf Release-iphoneos Release-universal nodejs-mobile.zip

          echo "✅ 框架已放置到 $TARGET_DIR/NodeMobile.xcframework"

      - name: Generate Xcode Project
        run: xcodegen

      - name: Build TVBox
        run: |
          echo "=== 清理构建目录 ==="
          xcodebuild clean -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS' || echo "清理完成"

          echo "=== 开始构建应用 ==="
          set +o pipefail
          xcodebuild build \
            -project tvbox.xcodeproj \
            -scheme tvbox \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            2>&1 | tee build.log

          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✅ 构建成功"
            APP_PATH=$(find ./DerivedData -name "tvbox.app" -type d | head -1)
            [ -z "$APP_PATH" ] && APP_PATH=$(find ./DerivedData -name "TVBox.app" -type d | head -1)
            mkdir -p Build/Payload
            cp -r "$APP_PATH" Build/Payload/
            cd Build
            zip -r tvbox-Swift-TrollStore.ipa Payload
            cd ..
            echo "✅ IPA 打包完成: Build/tvbox-Swift-TrollStore.ipa"
          else
            echo "❌ 构建失败"
            exit 1
          fi

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Swift-TrollStore
          path: Build/tvbox-Swift-TrollStore.ipa
          retention-days: 30

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build.log
          retention-days: 7
