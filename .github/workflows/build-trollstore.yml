      - name: Build TVBox
        run: |
          echo "=== 清理构建目录 ==="
          xcodebuild clean -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS' || echo "清理完成"
          
          echo "=== 开始构建应用 ==="
          set +o pipefail
          xcodebuild build \
            -project tvbox.xcodeproj \
            -scheme tvbox \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            2>&1 | tee build.log
          
          BUILD_EXIT_CODE=${PIPESTATUS[0]}
          
          # 提取错误摘要（带上下文）
          echo "=== 生成错误摘要 ==="
          echo "提取所有包含 'error:' 的行及其前后各5行：" > error_summary.txt
          grep -n -B5 -A5 "error:" build.log >> error_summary.txt || echo "未找到错误信息" >> error_summary.txt
          
          if [ $BUILD_EXIT_CODE -eq 0 ]; then
            echo "✅ 构建成功"
            
            APP_PATH=$(find ./DerivedData -name "tvbox.app" -type d | head -1)
            if [ -z "$APP_PATH" ]; then
              APP_PATH=$(find ./DerivedData -name "TVBox.app" -type d | head -1)
            fi
            
            if [ -z "$APP_PATH" ]; then
              echo "❌ 未找到.app文件"
              find ./DerivedData -name "*.app" -type d
              exit 1
            fi
            
            echo "APP_PATH: $APP_PATH"
            
            # 打包IPA（省略详细步骤，保持原有逻辑）
            echo "=== 打包IPA ==="
            mkdir -p ./Build
            TEMP_DIR=$(mktemp -d)
            mkdir -p "$TEMP_DIR/Payload"
            cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
            cd "$TEMP_DIR"
            zip -r "$GITHUB_WORKSPACE/Build/tvbox-Swift-TrollStore.ipa" Payload
            cd "$GITHUB_WORKSPACE"
            rm -rf "$TEMP_DIR"
            echo "✅ IPA打包完成: ./Build/tvbox-Swift-TrollStore.ipa"
            
          else
            echo "❌ 构建失败，退出码: $BUILD_EXIT_CODE"
            echo "=== 错误摘要（最后50行） ==="
            tail -50 build.log
            echo ""
            echo "完整错误信息请下载 build-log 和 error-summary artifacts"
            exit 1
          fi
          
      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./build.log
            ./error_summary.txt
          retention-days: 7
