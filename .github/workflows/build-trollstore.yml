name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
          
      - name: Install xcodegen
        run: brew install xcodegen
          
      - name: Generate Xcode Project
        run: xcodegen
          
      - name: Check NodeMobile Symbols
        run: |
          echo "=== 检查 NodeMobile 框架中的符号 ==="
          
          BINARY_PATH="Libraries/nodejs-mobile/NodeMobile.xcframework/ios-arm64/NodeMobile.framework/NodeMobile"
          
          if [ -f "$BINARY_PATH" ]; then
            echo "✅ 找到 NodeMobile 二进制文件"
            
            echo "1. 检查文件类型:"
            file "$BINARY_PATH"
            
            echo "2. 检查架构:"
            lipo -info "$BINARY_PATH"
            
            echo "3. 查找 node_post_message 符号:"
            nm "$BINARY_PATH" 2>/dev/null | grep -i "node_post_message" || echo "未找到 node_post_message 符号"
            
            echo "4. 查找 node_start 符号:"
            nm "$BINARY_PATH" 2>/dev/null | grep -i "node_start" || echo "未找到 node_start 符号"
            
            echo "5. 查找所有包含 'node' 的符号:"
            nm "$BINARY_PATH" 2>/dev/null | grep -i "node" | head -20
          else
            echo "❌ NodeMobile 二进制文件不存在: $BINARY_PATH"
          fi
          
      - name: Build TVBox (Multiple Strategies)
        run: |
          # 清理构建目录
          xcodebuild clean -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS'
          
          # 策略1: 尝试标准构建
          echo "=== 策略1: 标准构建 ==="
          if xcodebuild build \
            -project tvbox.xcodeproj \
            -scheme tvbox \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            2>&1 | tee build.log; then
            echo "✅ 策略1 成功"
            BUILD_SUCCESS=true
            DERIVED_DATA="./DerivedData"
          else
            echo "❌ 策略1 失败"
            BUILD_SUCCESS=false
          fi
          
          # 如果策略1失败，尝试策略2: 不使用 Node.js
          if [ "$BUILD_SUCCESS" = false ]; then
            echo ""
            echo "=== 策略2: 尝试临时移除 Node.js 依赖 ==="
            
            # 备份原始文件
            cp tvbox/NodeJSBridge.swift tvbox/NodeJSBridge.swift.backup
            
            # 临时修改 NodeJSBridge.swift，移除对 node_post_message 的调用
            sed -i '' 's/jsonString.withCString { node_post_message(\$0) }/print("Node.js disabled: \(jsonString)")/g' tvbox/NodeJSBridge.swift
            sed -i '' 's/node_start(Int32(argc), argv)/print("Node.js startup disabled")/g' tvbox/NodeJSBridge.swift
            
            if xcodebuild build \
              -project tvbox.xcodeproj \
              -scheme tvbox \
              -destination 'generic/platform=iOS' \
              CODE_SIGN_IDENTITY="" \
              CODE_SIGNING_REQUIRED=NO \
              CODE_SIGNING_ALLOWED=NO \
              -derivedDataPath ./DerivedData2 \
              2>&1 | tee -a build.log; then
              echo "✅ 策略2 成功 (Node.js 功能被禁用)"
              BUILD_SUCCESS=true
              DERIVED_DATA="./DerivedData2"
            else
              echo "❌ 策略2 失败"
              # 恢复备份
              mv tvbox/NodeJSBridge.swift.backup tvbox/NodeJSBridge.swift
            fi
          fi
          
          if [ "$BUILD_SUCCESS" = false ]; then
            echo "❌ 所有构建策略都失败了"
            exit 1
          fi
          
          # 找到生成的 .app 包路径
          APP_PATH=$(find "$DERIVED_DATA" -name "tvbox.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find "$DERIVED_DATA" -name "TVBox.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app 文件"
            exit 1
          fi
          
          echo "APP_PATH: $APP_PATH"
          
          # 验证 .app 包结构
          echo "=== 验证 .app 包结构 ==="
          
          # 检查 Info.plist
          if [ -f "$APP_PATH/Info.plist" ]; then
            echo "✅ Info.plist 存在"
            echo "Info.plist 内容摘要:"
            plutil -p "$APP_PATH/Info.plist" | head -20 || echo "无法解析 Info.plist"
          else
            echo "❌ 错误: Info.plist 不存在于 .app 包中!"
            echo ".app 包内容:"
            ls -la "$APP_PATH/"
            
            # 尝试从源位置复制 Info.plist
            if [ -f "tvbox/Info.plist" ]; then
              echo "尝试从源位置复制 Info.plist..."
              cp "tvbox/Info.plist" "$APP_PATH/"
              echo "✅ 已复制 Info.plist 到 .app 包"
            else
              echo "❌ 源 Info.plist 也不存在"
              exit 1
            fi
          fi
          
          # 检查可执行文件
          if [ -f "$APP_PATH/TVBox" ] || [ -f "$APP_PATH/tvbox" ]; then
            echo "✅ 可执行文件存在"
          else
            echo "⚠️ 可执行文件不存在，检查其他名称:"
            find "$APP_PATH" -type f -perm +111 | head -5 || echo "未找到可执行文件"
          fi
          
          # 检查 Frameworks 目录
          if [ -d "$APP_PATH/Frameworks" ]; then
            echo "✅ Frameworks 目录存在"
            echo "框架列表:"
            ls -la "$APP_PATH/Frameworks/"
          else
            echo "⚠️ Frameworks 目录不存在"
          fi
          
          # 正确打包 IPA
          echo "=== 打包 IPA ==="
          mkdir -p ./Build
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          
          cd "$TEMP_DIR"
          zip -r "$GITHUB_WORKSPACE/Build/tvbox-Swift-TrollStore.ipa" Payload
          
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"
          
          echo "✅ IPA 打包完成: ./Build/tvbox-Swift-TrollStore.ipa"
          ls -lh ./Build/tvbox-Swift-TrollStore.ipa
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Swift-TrollStore
          path: ./Build/tvbox-Swift-TrollStore.ipa
          retention-days: 30
          
      - name: Upload Build Logs
        if: always()  # 无论成功失败都上传日志
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ./build.log
            ${{ runner.temp }}/xcodebuild_*.log
          retention-days: 7
