name: Build TrollStore TVBox

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-14
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          lfs: true
          
      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2'
          
      - name: Install xcodegen
        run: brew install xcodegen
          
      - name: Generate Xcode Project
        run: xcodegen
          
      - name: Verify NodeMobile Framework Structure
        run: |
          echo "=== 检查 NodeMobile.xcframework 结构 ==="
          
          FRAMEWORK_PATH="Libraries/nodejs-mobile/NodeMobile.xcframework"
          
          if [ -d "$FRAMEWORK_PATH" ]; then
            echo "✅ NodeMobile.xcframework 存在"
            
            # 检查 Info.plist
            echo "检查 Info.plist:"
            if [ -f "$FRAMEWORK_PATH/Info.plist" ]; then
              echo "✅ Info.plist 存在"
              # 提取可用库信息
              plutil -p "$FRAMEWORK_PATH/Info.plist" | grep -A 20 "AvailableLibraries"
            fi
            
            # 检查 iOS arm64 架构
            echo "检查 iOS arm64 架构:"
            if [ -d "$FRAMEWORK_PATH/ios-arm64" ]; then
              echo "✅ ios-arm64 变体存在"
              echo "目录内容:"
              ls -la "$FRAMEWORK_PATH/ios-arm64/"
            fi
          else
            echo "❌ NodeMobile.xcframework 不存在"
            exit 1
          fi
          
      - name: Install Dependencies
        run: |
          brew install libimobiledevice ideviceinstaller
          
      - name: Build TVBox (No Signing)
        run: |
          # 清理构建目录
          xcodebuild clean -project tvbox.xcodeproj -scheme tvbox -destination 'generic/platform=iOS'
          
          # 获取框架路径
          FRAMEWORK_PATH="$(pwd)/Libraries/nodejs-mobile/NodeMobile.xcframework"
          
          # 无签名构建
          echo "开始构建..."
          xcodebuild build \
            -project tvbox.xcodeproj \
            -scheme tvbox \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -derivedDataPath ./DerivedData \
            FRAMEWORK_SEARCH_PATHS="$FRAMEWORK_PATH" \
            OTHER_LDFLAGS="-framework NodeMobile"
          
          # 找到生成的 .app 包路径
          APP_PATH=$(find ./DerivedData -name "tvbox.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            APP_PATH=$(find ./DerivedData -name "TVBox.app" -type d | head -n 1)
          fi
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 未找到 .app 文件"
            find ./DerivedData -name "*.app" -type d
            exit 1
          fi
          
          echo "APP_PATH: $APP_PATH"
          
          # 正确打包 IPA
          mkdir -p ./Build
          TEMP_DIR=$(mktemp -d)
          mkdir -p "$TEMP_DIR/Payload"
          
          cp -r "$APP_PATH" "$TEMP_DIR/Payload/"
          
          cd "$TEMP_DIR"
          zip -r "$GITHUB_WORKSPACE/Build/tvbox-Swift-TrollStore.ipa" Payload
          
          cd "$GITHUB_WORKSPACE"
          rm -rf "$TEMP_DIR"
          
          echo "✅ IPA 打包完成"
          ls -lh ./Build/tvbox-Swift-TrollStore.ipa
          
      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: tvbox-Swift-TrollStore
          path: ./Build/tvbox-Swift-TrollStore.ipa
          retention-days: 30
