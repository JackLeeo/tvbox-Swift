name: tvbox
options:
  xcodegen:
    useBaseInternationalization: true
targets:
  tvbox:
    type: application
    platform: iOS
    deploymentTarget:
      iOS: 16.0
    sources:
      - tvbox
    resources:
      - tvbox/Assets.xcassets
      - tvbox/Resources/nodejs-project
    dependencies:
      - package: https://github.com/CodeEagle/VLCKit-SPM
        version: 3.6.0
      - package: https://github.com/Alamofire/Alamofire
        version: 5.8.1
      - package: https://github.com/swiftwebui/GCDWebServer
        version: 3.5.0
      - package: https://github.com/weichsel/ZIPFoundation
        version: 0.9.16
    settings:
      FRAMEWORK_SEARCH_PATHS:
        - $(inherited)
        - $(SRCROOT)/Libraries/nodejs-mobile
      OTHER_LDFLAGS:
        - $(inherited)
        - -framework
        - NodeMobile
      SWIFT_INCLUDE_PATHS:
        - $(inherited)
        - $(SRCROOT)/Libraries/nodejs-mobile
    preBuildScripts:
      - name: Check NodeMobile
        script: |
          if [ ! -d "$SRCROOT/Libraries/nodejs-mobile/NodeMobile.xcframework" ]; then
            echo "Downloading NodeMobile framework..."
            curl -L https://github.com/janeasystems/nodejs-mobile/releases/download/v18.18.0/nodejs-mobile-framework-universal.tar.gz -o nodejs-mobile.tar.gz
            tar -xzf nodejs-mobile.tar.gz
            mv NodeMobile.xcframework "$SRCROOT/Libraries/nodejs-mobile/"
            rm nodejs-mobile.tar.gz
          fi
packages:
  VLCKit-SPM:
    url: https://github.com/CodeEagle/VLCKit-SPM
    version: 3.6.0
  Alamofire:
    url: https://github.com/Alamofire/Alamofire
    version: 5.8.1
  GCDWebServer:
    url: https://github.com/swiftwebui/GCDWebServer
    version: 3.5.0
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation
    version: 0.9.16
